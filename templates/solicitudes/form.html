{% extends 'base.html' %}

{% block title %}{{ titulo }} - Cool & Go B2B{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-secondary mb-6">{{ titulo }}</h1>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="post" class="space-y-5">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}"
                       class="block text-sm font-medium text-secondary mb-1">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-primary text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-opacity-90 transition shadow">
                    Continuar → Agregar Productos
                </button>
                <a href="{% url 'solicitudes:lista' %}"
                   class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
